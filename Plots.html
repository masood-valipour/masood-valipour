<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-photon State Probabilities</title>
    
    <!-- Plotly.js for plotting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        h3 {
            text-align: center;
            color: #333;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        #heatmap-graph {
            width: 100%;
            margin: 20px 0;
        }
        
        #param-display {
            font-size: 18px;
            margin: 10px;
            text-align: center;
            font-weight: bold;
            color: #555;
        }
        
        .slider-container {
            margin: 10px;
            width: 60%;
        }
        
        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #d3d3d3;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }
        
        .slider-value {
            display: inline-block;
            margin-left: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h3>Optimum vs Unentangled vs Entangled Two-photon State Probabilities</h3>
    
    <div class="container">
        <div id="heatmap-graph"></div>
        <div id="param-display">Loading...</div>
        
        <div class="slider-container">
            <label>
                Gamma_e: <span id="gamma-value" class="slider-value">0.0000</span>
            </label>
            <input type="range" id="gamma-slider" min="0" max="0" step="1" value="0">
        </div>
        
        <div class="slider-container">
            <label>
                Delta_a: <span id="delta-value" class="slider-value">0.00</span>
            </label>
            <input type="range" id="delta-slider" min="0" max="0" step="1" value="0">
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
