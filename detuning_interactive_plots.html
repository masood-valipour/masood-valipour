<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-photon State Probabilities</title>
   
<!-- MathJax for LaTeX rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS-MML_SVG"></script>
    
    <!-- Math.js for complex numbers and mathematical operations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    
    <!-- Plotly.js for plotting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        h3 {
            text-align: center;
            color: #333;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        #heatmap-graph {
            width: 100%;
            margin: 20px 0;
        }
        
        #param-display {
            font-size: 18px;
            margin: 10px;
            text-align: center;
            font-weight: bold;
            color: #555;
        }
        
        .slider-container {
            margin: 10px;
            width: 60%;
        }
        
        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #d3d3d3;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4CAF50;
            cursor: pointer;
        }
        
        .slider-value {
            display: inline-block;
            margin-left: 10px;
            color: #666;
        }
        /* Checkbox styling */
        .checkbox-container {
            margin: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #e8f5e9;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #4CAF50;
        }
        
        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-container label {
            font-size: 16px;
            cursor: pointer;
            margin: 0;
            color: #2e7d32;
        }

    </style>
</head>
<body>
    <h3>Optimum vs Entangled vs Unentangled Two-photon State Probabilities</h3>
    
    <div class="container">
        <div id="heatmap-graph"></div>
        <div id="param-display">Loading...</div>

        <div class="checkbox-container">
            <input type="checkbox" id="optimum-deltaf-check" checked>
            <label for="optimum-deltaf-check">Optimum δ<sub>f</sub></label>
        </div>
        
        <div class="slider-container">
            <label>
                Γ<sub>e</sub> / Γ<sub>f</sub> : <span id="gamma-value" class="slider-value">0.0000</span>
            </label>
            <input type="range" id="gamma-slider" min="0" max="0" step="1" value="0">
        </div>
        
        <div class="slider-container">
            <label>
                δ<sub>a</sub>/ Γ<sub>f</sub>: <span id="delta-value" class="slider-value">0.00</span>
            </label>
            <input type="range" id="delta-slider" min="0" max="0" step="1" value="0">
        </div>
 

   <div style="margin: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px;">
    <h3>Domain Range Settings</h3>
    <div style="display: flex; gap: 20px; align-items: center;">
        <label>
            Domain Range:
            <input type="number" id="domain-range" value="5" step="0.5" min="0.5" max="50" style="width: 80px; padding: 5px;">
        </label>
        <button id="update-domain" style="padding: 8px 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px;">
            Update Domain
        </button>
        <span id="domain-display" style="font-style: italic; color: #666;">
            Current: Optimum [-5, 0], Others [-5, 5]
        </span>
    </div>
</div>


    
    <script src="script.js"></script>
</body>
</html>
